services:
  # 1. Backend FastAPI Service
  - type: web
    name: startup-insight-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: startup-insight-db
          property: internalConnectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: "noreply@startupinsight.ai"
      - key: RESEND_API_KEY
        sync: false



  # 2. Frontend Next.js Service
  - type: web
    name: startup-insight-app
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: startup-insight-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: 20.11.1

databases:
  - name: startup-insight-db
    plan: free
